<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel – Buana Duta Wisata</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }

    /* LOGIN */
    #loginPage {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: linear-gradient(135deg, #1a1a1a, #0f0f0f);
    }
    .login-box {
      background: #1e1e1e; border: 1px solid #C9A84C;
      border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 380px;
      text-align: center;
    }
    .login-box h1 { color: #C9A84C; font-size: 1.5rem; margin-bottom: 0.5rem; }
    .login-box p { color: #999; font-size: 0.85rem; margin-bottom: 2rem; }
    .login-box input {
      width: 100%; padding: 0.8rem 1rem; margin-bottom: 1rem;
      background: #2a2a2a; border: 1px solid #333; border-radius: 8px;
      color: #fff; font-size: 1rem;
    }
    .login-box input:focus { outline: none; border-color: #C9A84C; }
    .btn-login {
      width: 100%; padding: 0.8rem; background: #C9A84C; color: #000;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-login:hover { background: #E8CC84; }
    .error-msg { color: #ff4444; font-size: 0.85rem; margin-top: 0.5rem; display:none; }

    /* ADMIN PANEL */
    #adminPage { display: none; }
    .topbar {
      background: #1e1e1e; border-bottom: 1px solid #C9A84C;
      padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
    }
    .topbar h1 { color: #C9A84C; font-size: 1.2rem; }
    .topbar span { color: #999; font-size: 0.85rem; }
    .btn-logout {
      background: transparent; border: 1px solid #ff4444; color: #ff4444;
      padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    }
    .btn-logout:hover { background: #ff4444; color: #fff; }

    .container { padding: 2rem; }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card {
      background: #1e1e1e; border: 1px solid #333; border-radius: 10px;
      padding: 1.2rem; text-align: center;
    }
    .stat-card .number { font-size: 2rem; font-weight: 700; color: #C9A84C; }
    .stat-card .label { color: #999; font-size: 0.85rem; margin-top: 0.3rem; }

    /* TABLE */
    .table-wrap {
      background: #1e1e1e; border: 1px solid #333; border-radius: 10px; overflow: hidden;
    }
    .table-header {
      padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #333;
    }
    .table-header h2 { font-size: 1rem; color: #fff; }
    .btn-refresh {
      background: #C9A84C; color: #000; border: none; padding: 0.4rem 1rem;
      border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
    }
    .btn-refresh:hover { background: #E8CC84; }

    table { width: 100%; border-collapse: collapse; }
    thead { background: #252525; }
    thead th { padding: 0.8rem 1rem; text-align: left; font-size: 0.8rem; color: #C9A84C; text-transform: uppercase; letter-spacing: 0.05em; }
    tbody tr { border-bottom: 1px solid #2a2a2a; transition: background 0.15s; }
    tbody tr:hover { background: #252525; }
    tbody td { padding: 0.9rem 1rem; font-size: 0.9rem; color: #ddd; }
    tbody td.wa { color: #25D366; }
    .badge {
      display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px;
      font-size: 0.75rem; font-weight: 600; background: #C9A84C22; color: #C9A84C;
    }
    .empty { text-align: center; padding: 3rem; color: #555; }
    .loading { text-align: center; padding: 2rem; color: #C9A84C; }
  </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="login-box">
    <h1>🕌 Admin Panel</h1>
    <p>Buana Duta Wisata – Travel Haji & Umroh</p>
    <input type="password" id="passwordInput" placeholder="Masukkan password admin" onkeydown="if(event.key==='Enter') login()"/>
    <button class="btn-login" onclick="login()">Masuk</button>
    <div class="error-msg" id="errorMsg">Password salah! Coba lagi.</div>
  </div>
</div>

<!-- ADMIN PAGE -->
<div id="adminPage">
  <div class="topbar">
    <h1>🕌 Buana Duta Wisata – Admin Panel</h1>
    <div style="display:flex;align-items:center;gap:1rem;">
      <span id="lastUpdate"></span>
      <button class="btn-logout" onclick="logout()">Keluar</button>
    </div>
  </div>

  <div class="container">
    <div class="stats">
      <div class="stat-card">
        <div class="number" id="totalPendaftar">–</div>
        <div class="label">Total Pendaftar</div>
      </div>
      <div class="stat-card">
        <div class="number" id="pendaftarHariIni">–</div>
        <div class="label">Pendaftar Hari Ini</div>
      </div>
      <div class="stat-card">
        <div class="number" id="paketTerbanyak">–</div>
        <div class="label">Paket Terbanyak</div>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <h2>Data Pendaftar</h2>
        <button class="btn-refresh" onclick="loadData()">🔄 Refresh</button>
      </div>
      <div id="tableContent">
        <div class="loading">Memuat data...</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var SUPABASE_URL = 'https://nxiqgmwnuzhnubwamnjp.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_PVtQ84jPJ-00LXjoIVb36Q_G99Li6dB';
  var ADMIN_PASSWORD = 'bdwisata2024'; // ← GANTI PASSWORD INI!
  var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function login() {
    var pass = document.getElementById('passwordInput').value;
    if (pass === ADMIN_PASSWORD) {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('adminPage').style.display = 'block';
      loadData();
    } else {
      document.getElementById('errorMsg').style.display = 'block';
    }
  }

  function logout() {
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('adminPage').style.display = 'none';
    document.getElementById('passwordInput').value = '';
  }

  async function loadData() {
    document.getElementById('tableContent').innerHTML = '<div class="loading">Memuat data...</div>';
    
    var result = await db.from('pendaftaran').select('*').order('tanggal_daftar', { ascending: false });
    
    if (result.error) {
      document.getElementById('tableContent').innerHTML = '<div class="empty">Gagal memuat data: ' + result.error.message + '</div>';
      return;
    }

    var data = result.data;
    
    // Stats
    document.getElementById('totalPendaftar').textContent = data.length;
    
    var today = new Date().toDateString();
    var hariIni = data.filter(function(d) {
      return new Date(d.tanggal_daftar).toDateString() === today;
    }).length;
    document.getElementById('pendaftarHariIni').textContent = hariIni;

    // Paket terbanyak
    var paketCount = {};
    data.forEach(function(d) {
      var p = d.paket || 'Belum dipilih';
      paketCount[p] = (paketCount[p] || 0) + 1;
    });
    var topPaket = Object.keys(paketCount).sort(function(a,b){ return paketCount[b]-paketCount[a]; })[0];
    document.getElementById('paketTerbanyak').textContent = topPaket ? topPaket.split('–')[0].trim() : '–';

    // Last update
    document.getElementById('lastUpdate').textContent = 'Update: ' + new Date().toLocaleTimeString('id-ID');

    // Table
    if (data.length === 0) {
      document.getElementById('tableContent').innerHTML = '<div class="empty">Belum ada pendaftar.</div>';
      return;
    }

    var rows = data.map(function(d, i) {
      var tgl = d.tanggal_daftar ? new Date(d.tanggal_daftar).toLocaleString('id-ID') : '-';
      return '<tr>' +
        '<td>' + (i+1) + '</td>' +
        '<td><strong>' + (d.nama||'-') + '</strong></td>' +
        '<td class="wa"><a href="https://wa.me/' + (d.whatsapp||'').replace(/\D/g,'') + '" target="_blank" style="color:#25D366;text-decoration:none;">📱 ' + (d.whatsapp||'-') + '</a></td>' +
        '<td><span class="badge">' + (d.paket||'Belum dipilih') + '</span></td>' +
        '<td>' + (d.jumlah_jamaah||'-') + '</td>' +
        '<td>' + (d.pesan||'-') + '</td>' +
        '<td style="color:#888;font-size:0.8rem;">' + tgl + '</td>' +
      '</tr>';
    }).join('');

    document.getElementById('tableContent').innerHTML = 
      '<table>' +
        '<thead><tr>' +
          '<th>No</th><th>Nama</th><th>WhatsApp</th><th>Paket</th><th>Jamaah</th><th>Pesan</th><th>Tanggal</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>';
  }
</script>
</body>
</html>
